<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrendBridge | 트렌드 차트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body data-page="dashboard">
  <header class="site-header">
    <div class="topbar">
      <div class="left-group">
        <a class="brand" href="index.html">TrendBridge</a>
        <nav class="nav">
          <a href="index.html" data-page="jobs">공고 보기</a>
          <a href="jobs.html" data-page="dashboard">트렌드 차트</a>
          <a href="matching.html" data-page="matching">매칭 분석</a>
          
        </nav>
      </div>
      <button class="theme-toggle" type="button" data-theme-toggle aria-pressed="false">다크 모드</button>
      <div id="authArea" class="auth-area"><a class="auth-btn secondary" href="login.html">로그인</a><a class="auth-btn" href="signup.html">회원가입</a></div>
    </div>
  </header>


  <main class="container">
    <section class="hero">
      <h1>트렌드 차트</h1>
      <p></p>
    </section>

    <section class="grid two" style="margin-top:18px;">
      <div class="card">
        <!-- <h2>트렌드 조회</h2> -->
        <div class="row" style="margin-bottom: 10px;">
          <select id="trendRoleSelect">
            <option value="backend">백엔드</option>
            <option value="frontend">프론트엔드</option>
            <option value="mobile">모바일</option>
            <option value="ai">인공지능/데이터</option>
            <option value="infra">인프라/보안</option>
          </select>
        </div>
        <div id="trendTop10List" class="list"></div>
      </div>

      <div class="card">
        <h2>보조 인사이트</h2>
        <div class="tabs" id="insightTabs">
          <button class="tab-btn active" data-tab="new">신규 진입</button>
          <button class="tab-btn" data-tab="down">하락·정체</button>
        </div>
        <div id="insightContent" class="list" style="margin-top:12px;"></div>
      </div>
    </section>
  </main>
  <script src="/js/theme.js" defer></script>
  <script src="/js/auth.js" defer></script>
  <script>
    const jobs = window.jobsData || [];

    const trendRoleSelect = document.getElementById("trendRoleSelect");
    const trendTop10List = document.getElementById("trendTop10List");

    const parseStacks = (stackText) => (stackText || "")
      .split(",")
      .map((item) => item.trim())
      .filter(Boolean);

    const renderTop10 = (role) => {
      if (!trendTop10List) return;
      const freq = new Map();
      jobs
        .filter((job) => job.category === role)
        .forEach((job) => {
          parseStacks(job.stack).forEach((stack) => {
            freq.set(stack, (freq.get(stack) || 0) + 1);
          });
        });

      const items = Array.from(freq.entries())
        .sort((a, b) => b[1] - a[1])
        .slice(0, 10);

      if (items.length === 0) {
        trendTop10List.innerHTML = "<p class=\"muted\">표시할 데이터가 없습니다.</p>";
        return;
      }

      const max = items[0][1] || 1;
      trendTop10List.innerHTML = items
        .map(
          ([name, count]) => `
            <div class="trend-item">
              <span class="trend-name">${name}</span>
              <div class="trend-bar"><span style="width:${(count / max) * 100}%"></span></div>
              <span class="trend-value">${count}</span>
            </div>
          `
        )
        .join("");
    };

    trendRoleSelect?.addEventListener("change", () => {
      renderTop10(trendRoleSelect.value);
    });

    renderTop10(trendRoleSelect?.value || "backend");
  </script>
</body>
</html>
