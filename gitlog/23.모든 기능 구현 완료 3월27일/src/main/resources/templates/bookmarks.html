<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrendBridge | 즐겨찾기 공고</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css?v=3" th:href="@{/css/styles.css(v=3)}" />
</head>
<body data-page="즐겨찾기" data-protected="true">
  <header class="site-header">
    <div class="topbar">
      <a class="brand" href="/" th:href="@{/}">TrendBridge</a>
      <nav class="nav">
        <a href="/" th:href="@{/}" data-page="jobs">공고 보기</a>
        <a href="/jobs" th:href="@{/jobs}" data-page="dashboard">트렌드 차트</a>
        <a href="/matching" th:href="@{/matching}" data-page="matching">매칭 분석</a>
        <a href="/profile" th:href="@{/profile}" data-page="profile">프로필</a>
      </nav>
      <div id="themeArea" class="theme-area"><button class="auth-btn secondary" type="button" data-theme-toggle>다크 모드</button></div>
      <div id="authArea" class="auth-area">
        <a class="auth-btn secondary" href="/login" th:href="@{/login}">로그인</a>
        <a class="auth-btn" href="/signup" th:href="@{/signup}">회원가입</a>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>즐겨찾기 공고</h1>
      <p>관심 공고를 모아보고, 다시 비교하거나 바로 지원할 수 있습니다.</p>
    </section>

    <section class="card" style="margin-top:16px">
      <div class="row" style="justify-content:space-between; margin-bottom:12px;">
        <h2 style="margin:0;">공고</h2>
        <a class="auth-btn secondary" href="/profile" th:href="@{/profile}">프로필로 돌아가기</a>
      </div>
      <div id="bookmarkList" class="list"></div>
    </section>
  </main>

  <script src="/js/theme.js" th:src="@{/js/theme.js}" defer></script>
  <script src="/js/auth.js" th:src="@{/js/auth.js}" defer></script>
  <script src="/js/bookmarks.js" th:src="@{/js/bookmarks.js}" defer></script>
</body>
</html>
