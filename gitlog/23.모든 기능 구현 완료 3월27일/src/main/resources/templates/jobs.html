<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TrendBridge | 트렌드 차트</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;600;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css?v=3" th:href="@{/css/styles.css(v=3)}"/>
</head>
<body data-page="dashboard">
<header class="site-header">
    <div class="topbar">
        <a class="brand" href="/" th:href="@{/}">TrendBridge</a>
        <nav class="nav">
            <a href="/" th:href="@{/}" data-page="jobs">공고 보기</a>
            <a href="/jobs" th:href="@{/jobs}" data-page="dashboard">트렌드 차트</a>
            <a href="/matching" th:href="@{/matching}" data-page="matching">매칭 분석</a>
            <a href="/profile" th:href="@{/profile}" data-page="profile">프로필</a>
        </nav>
        <div id="themeArea" class="theme-area">
            <button class="auth-btn secondary" type="button" data-theme-toggle>다크 모드</button>
        </div>
        <div id="authArea" class="auth-area">
            <button class="auth-btn secondary" type="button" data-theme-toggle>다크 모드</button>
            <a class="auth-btn secondary" href="/login" th:href="@{/login}">로그인</a><a class="auth-btn" href="/signup"
                                                                                      th:href="@{/signup}">회원가입</a>
        </div>
    </div>
</header>

<main class="container">
    <section class="hero">
        <h1>트렌드 차트</h1>
    </section>

    <section class="trend-grid">
        <div class="trend-card trend-insight">
            <h3>카테고리별 공고 비중</h3>
            <div class="trend-insight-box">
                <canvas id="categoryDonutChart" style="max-width:300px; margin: 0 auto;"></canvas>
            </div>
        </div>

        <div class="trend-card trend-combo-card">
            <div class="trend-header">
                <div>
                    <h2>트렌드 조회</h2>
                </div>
                <div class="trend-badges">
                </div>
            </div>
            <div class="trend-tabs">
                <a href="/jobs?cat=2" th:classappend="${selectedCat == 2} ? 'active' : ''">백엔드</a>
                <a href="/jobs?cat=1" th:classappend="${selectedCat == 1} ? 'active' : ''">프론트엔드</a>
                <a href="/jobs?cat=3" th:classappend="${selectedCat == 3} ? 'active' : ''">인공지능/데이터</a>
                <a href="/jobs?cat=4" th:classappend="${selectedCat == 4} ? 'active' : ''">인프라/보안</a>
                <a href="/jobs?cat=5" th:classappend="${selectedCat == 5} ? 'active' : ''">모바일</a>
            </div>

            <div class="trend-card-head">
                <h3>TOP10 기술 스택</h3>
                <span class="muted">공고 수</span>
                <span class="muted">빈도 기준</span>
            </div>
            <div id="trendTop10List" class="trend-list">
                <div class="trend-row" th:each="item, iter : ${list}" th:if="${iter.index < 10}">
                    <div class="trend-rank" th:text="${iter.index + 1}">1</div>
                    <div class="trend-main">
                        <div class="trend-name">
                            <button type="button"
                                    class="trend-tech-link"
                                    th:text="${item.stackname}"
                                    th:attr="data-stack=${item.stackname}">
                                React
                            </button>
                            <span class="trend-count" th:text="${item.cnt} + '건'">120건</span>
                        </div>
                        <div class="trend-bar">
                            <span th:style="'width:' + ${item.percent} + '%;'"></span>
                        </div>
                    </div>
                    <div class="trend-percent" th:text="${item.percent} + '%'">24%</div>
                </div>
                <div class="trend-empty" th:if="${list == null or list.isEmpty()}">
                    표시할 데이터가 없습니다.
                </div>
            </div>
        </div>
    </section>

    <section style="margin-top:24px;">
        <div id="jobResultArea" class="trend-card">
            <h3>연관 공고</h3>
        </div>
    </section>
</main>
<script src="/js/theme.js" th:src="@{/js/theme.js}" defer></script>
<script src="/js/auth.js" th:src="@{/js/auth.js}" defer></script>
<script src="/js/bookmark-manager.js" th:src="@{/js/bookmark-manager.js}" defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
<script th:inline="javascript">
    const categoryData = /*[[${categoryList}]]*/ [];
    const selectedCat = /*[[${selectedCat}]]*/ 1;
    let profileStackSet = new Set();

    document.addEventListener("DOMContentLoaded", function () {
        const canvas = document.getElementById("categoryDonutChart");
        window.BookmarkManager.ensureLoaded();
        loadProfileStacks();
        bindTechButtons();

        if (!canvas || !Array.isArray(categoryData) || categoryData.length === 0) {
            return;
        }

        const filteredCategoryData = categoryData.filter(item => item.categoryId !== 6);

        const labels = filteredCategoryData.map(item => item.stackname);
        const values = filteredCategoryData.map(item => item.cnt);
        const totalValue = values.reduce((sum, value) => sum + value, 0);
        const percents = filteredCategoryData.map(item =>
            totalValue > 0 ? ((item.cnt / totalValue) * 100).toFixed(2) : "0.00"
        );
        const baseColors = {
            1: "rgba(33, 150, 243, 0.35)",
            2: "rgba(76, 175, 80, 0.35)",
            3: "rgba(156, 39, 176, 0.35)",
            4: "rgba(244, 67, 54, 0.35)",
            5: "rgba(96, 125, 139, 0.35)",
        };
        const highlightColors = {
            1: "#0b63ce",
            2: "#167a24",
            3: "#6a1b9a",
            4: "#c62828",
            5: "#455a64",
        };
        const backgroundColors = filteredCategoryData.map(item =>
            item.categoryId === selectedCat
                ? (highlightColors[item.categoryId] || "#0f766e")
                : (baseColors[item.categoryId] || "rgba(148, 163, 184, 0.35)")
        );
        const borderWidths = filteredCategoryData.map(item => item.categoryId === selectedCat ? 2 : 1);
        const borderColors = filteredCategoryData.map(item => item.categoryId === selectedCat ? "rgba(255,255,255,0.9)" : "rgba(255,255,255,0.55)");

        new Chart(canvas, {
            type: "doughnut",
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: backgroundColors,
                    borderWidth: borderWidths,
                    borderColor: borderColors,
                    hoverOffset: 8
                }]
            },
            plugins: [ChartDataLabels],
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: "bottom"
                    },
                    tooltip: {
                        enabled: false
                    },
                    datalabels: {
                        color: "#000",
                        font: {
                            weight: "bold",
                            size: 12
                        },
                        formatter: function (value, context) {
                            const index = context.dataIndex;
                            const percent = percents[index];
                            return value + "건\n(" + percent + "%)";
                        }
                    }
                },
            }
        });
    });

    function bindTechButtons() {
        document.querySelectorAll(".trend-tech-link").forEach((button) => {
            button.addEventListener("click", () => {
                const stackname = button.dataset.stack;
                if (stackname) {
                    loadJobsByTech(stackname);
                }
            });
        });
    }

    async function loadProfileStacks() {
        try {
            const response = await fetch("/users/profile", {
                credentials: "same-origin"
            });

            if (!response.ok) {
                profileStackSet = new Set();
                return;
            }

            const data = await response.json();
            if (!data.loggedIn || !Array.isArray(data.stackNames)) {
                profileStackSet = new Set();
                return;
            }

            profileStackSet = new Set(
                data.stackNames
                    .map((stack) => String(stack || "").trim().toLowerCase())
                    .filter(Boolean)
            );
        } catch {
            profileStackSet = new Set();
        }
    }

    async function loadJobsByTech(stackname) {
        const container = document.getElementById("jobResultArea");
        if (!container) return;

        container.innerHTML = "<h3>연관 공고</h3><p class=\"muted\">로딩중...</p>";

        try {
            await window.BookmarkManager.fetchBookmarkedIds();

            const response = await fetch(`/jobs/by-tech?stackname=${encodeURIComponent(stackname)}&cat=${selectedCat}`);
            if (!response.ok) {
                throw new Error("서버 응답 오류: " + response.status);
            }

            const jobs = await response.json();
            renderJobs(jobs, stackname);
        } catch (error) {
            console.error("공고 조회 에러:", error);
            container.innerHTML = "<h3>연관 공고</h3><p class=\"muted\">공고를 불러오는 중 문제가 발생했습니다.</p>";
        }
    }

    function renderJobs(jobs, stackname) {
        const container = document.getElementById("jobResultArea");
        if (!container) return;

        let html = `<h3>${escapeHtml(stackname)} 관련 공고</h3>`;

        if (!Array.isArray(jobs) || jobs.length === 0) {
            container.innerHTML = html + `<p class="muted">관련 공고가 없습니다.</p>`;
            return;
        }

        jobs.forEach((job) => {
            let techStacks = "-";

            if (job.techStack) {
                techStacks = job.techStack
                    .split(",")
                    .map((value) => {
                        const tech = value.trim();
                        const isUserStack = profileStackSet.has(tech.toLowerCase());

                        return `
                            <span class="pill" style="${isUserStack ? "background:#0f8a73;color:#fff;border-color:#0f8a73;" : ""}">
                                ${escapeHtml(tech)}
                            </span>
                        `;
                    })
                    .join(" ");
            }

            const rawUrl = job.postingUrl || job.postingURL || "";
            const safeUrl = rawUrl
                ? (rawUrl.startsWith("http://") || rawUrl.startsWith("https://") ? escapeHtml(rawUrl) : `http://${escapeHtml(rawUrl)}`)
                : "#";

            html += `
                <div class="item job-card" style="margin-top:16px;">
                    <div class="job-card-top" style="margin-bottom:8px;">
                        <div style="font-size:13px; color:#666;">
                            ${escapeHtml(job.companyName || "-")}
                        </div>
                        ${window.BookmarkManager.getButtonMarkup(job.postingId)}
                    </div>
                    <div class="row" style="justify-content: space-between; align-items:flex-start;">
                        <div style="flex:2;">
                            <div style="font-size:22px; font-weight:700; margin-bottom:10px;">
                                ${escapeHtml(job.jobPosition || "-")}
                            </div>
                            <div class="taglist" style="margin-bottom:12px;">
                                ${techStacks}
                            </div>
                            <a href="${safeUrl}" target="_blank" rel="noopener" class="auth-btn">
                                공고 바로가기
                            </a>
                        </div>

                        <div style="flex:1; font-size:14px; padding-left:20px; border-left:1px solid #ddd; display:grid; grid-template-columns:1fr 1fr; gap:6px 16px;">
                            <div><strong>연봉:</strong> ${escapeHtml(job.salary || "-")}</div>
                            <div><strong>학력:</strong> ${escapeHtml(job.education || "-")}</div>
                            <div><strong>근무지역:</strong> ${escapeHtml(job.region || "-")}</div>
                            <div><strong>고용형태:</strong> ${escapeHtml(job.employmentType || "-")}</div>
                            <div><strong>등록일:</strong> ${escapeHtml(formatDate(job.postedDate))}</div>
                            <div><strong>마감일:</strong> ${escapeHtml(formatDate(job.deadline))}</div>
                        </div>
                    </div>
                </div>
            `;
        });

        container.innerHTML = html;
        window.BookmarkManager.bindBookmarkButtons(container);
    }

    function formatDate(dateStr) {
        if (!dateStr) return "-";
        return String(dateStr).split(" ")[0];
    }

    function escapeHtml(value) {
        return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }
</script>
</body>
</html>
