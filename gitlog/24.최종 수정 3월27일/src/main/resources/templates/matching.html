<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrendBridge | 매칭 분석</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css?v=3" th:href="@{/css/styles.css(v=3)}" />
</head>
<body data-page="매칭 분석" data-protected="true">
  <header class="site-header">
    <div class="topbar">
      <a class="brand brand-mark" href="/" th:href="@{/}">
  <span class="brand-icon" aria-hidden="true"><span></span><span></span><span></span></span>
  <span class="brand-word"><span class="brand-trend">Trend</span><span class="brand-bridge">Bridge</span></span>
</a>
      <nav class="nav">
        <a href="/" th:href="@{/}" data-page="jobs">공고 보기</a>
        <a href="/jobs" th:href="@{/jobs}" data-page="dashboard">트렌드 차트</a>
        <a href="/matching" th:href="@{/matching}" data-page="matching">매칭 분석</a>
        <a href="/profile" th:href="@{/profile}" data-page="profile">프로필</a>
      </nav>
      <div id="themeArea" class="theme-area"><button class="auth-btn secondary" type="button" data-theme-toggle>다크 모드</button></div>
      <div id="authArea" class="auth-area"><a class="auth-btn secondary" href="/login" th:href="@{/login}">로그인</a><a class="auth-btn" href="/signup" th:href="@{/signup}">회원가입</a></div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>매칭 분석</h1>
<!--      <p>목표 공고를 선택하면 해당 공고 요구 스택 기준으로 매칭 지수와 부족 역량을 계산합니다.</p>-->
    </section>

    <section class="grid two" style="margin-top:16px">
      <article class="card">
        <h2>목표 공고 기반 매칭</h2>

        <h3 style="margin-top:14px">내 보유 스택</h3>
        <div id="myStacks" class="taglist"></div>


        <h3 style="margin-top:14px">공고 기준 갭 분석</h3>
        <p class="muted" style="margin:0 0 6px">보유</p>
        <div id="haveStacks" class="taglist"></div>
        <p class="muted" style="margin:10px 0 6px">부족</p>
        <div id="missingStacks" class="taglist"></div>

        <div class="row matching-card-actions" style="margin-top:16px">
          <button id="calcMatch" type="button">지수 계산</button>
        </div>
      </article>


      <article class="card">
        <h2>세부 설정</h2>
        <p class="muted" style="margin:0 0 10px">대분류와 소분류를 선택해 맞춤 회사를 확인합니다.</p>
        <div id="selectedJobDetail" class="job-detail-card" style="margin-bottom:10px;">
          <div class="muted">선택된 공고가 없습니다.</div>
        </div>
        <a class="auth-btn" href="/matching-detail" th:href="@{/matching-detail}">세부 설정 열기</a>
      </article>
    </section>

    <section class="card" style="margin-top:16px">
      <h3>결과</h3>
      <div id="matchScore" class="score">--%</div>
      <p id="matchSuggest" class="muted">목표 공고를 선택하고 지수 계산을 실행하세요.</p>

      <h3 style="margin-top:14px">점수 개선 시뮬레이션</h3>
      <div class="row">
        <div id="boostStack" class="boost-stack-list"></div>
        <button id="simulateBtn" type="button" class="secondary">예상 점수 보기</button>
      </div>
      <p id="simulateResult" class="match-simulate-result" style="margin-top:8px">부족 스택이 있을 때 시뮬레이션이 가능합니다.</p>
    </section>

    <section class="card" style="margin-top:16px">
      <div class="row" style="justify-content:space-between; align-items:flex-end; gap:12px;">
        <div>
          <h3 style="margin:0">추천 공고</h3>
          <p class="muted" style="
          margin:8px 0 0">내 보유 스택과 일치율이 높은 공고를 순서대로 보여줍니다.</p>
        </div>
      </div>
      <div id="recommendedJobs" class="recommended-jobs" style="margin-top:16px">
        <p class="muted">보유 스택을 입력하면 추천 공고를 보여드립니다.</p>
      </div>
    </section>
  </main>
  <script src="/js/theme.js" th:src="@{/js/theme.js}" defer></script>
  <script src="/js/auth.js?v=2" th:src="@{/js/auth.js(v=2)}" defer></script>
  <script src="/js/matching-selected.js?v=2" th:src="@{/js/matching-selected.js?v=2}" defer></script>
  <script src="/js/matching-profile.js?v=3" th:src="@{/js/matching-profile.js(v=3)}" defer></script>
  <script src="/js/matching-calc.js?v=2" th:src="@{/js/matching-calc.js(v=2)}" defer></script>
  <script src="/js/matching-recommend.js?v=1" th:src="@{/js/matching-recommend.js?v=1}" defer></script>
</body>
</html>
